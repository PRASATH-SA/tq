<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Intent Selection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-survey">
    <div class="container">
        <h1>What brings you here today?</h1>
        <p class="subtitle">There’s no right or wrong answer. Choose what feels true right now.</p>
        <div class="intent-grid">
            <div class="intent-card" data-intent="learn-skill">I want to learn a new skill</div>
            <div class="intent-card" data-intent="explore-interests">I’m exploring my interests</div>
            <div class="intent-card" data-intent="career">I’m thinking about my career</div>
            <div class="intent-card" data-intent="stuck">I feel stuck or uncertain</div>
            <div class="intent-card" data-intent="curious">I’m just curious</div>
        </div>
        <button class="continue-btn" id="continueBtn" disabled>Continue</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
